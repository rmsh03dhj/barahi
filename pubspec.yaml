name: barahi
description: Flutter GraphQL Example

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  graphql: ^3.0.2
  gql: ^0.12.3
  flutter_bloc: ^6.1.0
  get_it: ^4.0.2
  injectable: ^0.4.0+1
  equatable: ^1.2.5
  dartz:
  cupertino_icons: ^0.1.3
  amplify_core: '<1.0.0'
  amplify_auth_cognito: '<1.0.0'
  flutter_form_builder: ^3.14.1
  flutter_clean_architecture: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^1.10.0
  injectable_generator: ^0.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/